<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <title>Sem conexão | Apprumo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, rgba(26,178,199,0.15), transparent 30%),
                        linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #0f172a;
        }
        .offline-card {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            box-shadow: 0 1px 3px rgba(15,23,42,0.04), 0 8px 30px rgba(15,23,42,0.08);
            max-width: 400px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }
        .offline-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .offline-card h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .offline-card p {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .offline-btn {
            display: inline-block;
            background: #1AB2C7;
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            min-height: 48px;
            transition: background 0.2s;
        }
        .offline-btn:hover { background: #159aad; }
        .offline-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon" aria-hidden="true">📡</div>
        <h1>Sem conexão</h1>
        <p>Você está offline no momento. Verifique sua conexão com a internet e tente novamente.</p>
        <button class="offline-btn" onclick="window.location.reload()">Tentar novamente</button>
    </div>
</body>
</html>
